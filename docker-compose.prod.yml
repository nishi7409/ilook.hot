services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ilook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilook_secret}
      POSTGRES_DB: ilook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilook -d ilook"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/nishi7409/ilook.hot-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ilook:${POSTGRES_PASSWORD:-ilook_secret}@postgres:5432/ilook
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/nishi7409/ilook.hot-web:latest
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
