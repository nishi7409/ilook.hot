services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ilook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilook_secret}
      POSTGRES_DB: ilook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilook -d ilook"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/nishi7409/ilook.hot-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ilook:${POSTGRES_PASSWORD:-ilook_secret}@postgres:5432/ilook
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/nishi7409/ilook.hot-web:latest
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      # Comma-separated list of allowed hostnames for Angular SSR (optional)
      # ALLOWED_HOSTS: ilook.hot,dev.ilook.hot
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - api
      - web

configs:
  nginx_conf:
    content: |
      events {
        worker_connections 1024;
      }

      http {
        client_max_body_size 10m;

        server {
          listen 80;

          location /api/ {
            proxy_pass http://api:3000/api/;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /calendar/ {
            proxy_pass http://api:3000/calendar/;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location / {
            proxy_pass http://web:4000;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
          }
        }
      }

volumes:
  postgres_data:
