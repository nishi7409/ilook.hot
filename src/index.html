<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ilook.hot — track workouts, calories, and programs</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The open-source fitness tracker for people who want to look hot. Track programs, calories, and workouts — free, forever.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a1a20">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ilook.hot">
  <meta property="og:title" content="ilook.hot — track workouts, calories, and programs">
  <meta property="og:description" content="The open-source fitness tracker for people who want to look hot. Free, forever.">
  <meta property="og:image" content="/logo.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Apply saved theme before Angular boots to avoid flash -->
  <script>
    try {
      var t = localStorage.getItem('ilook-theme');
      var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    } catch (e) {}
  </script>
  <app-root></app-root>
</body>
</html>
