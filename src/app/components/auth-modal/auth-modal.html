<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
  (click)="closeOnBackdrop($event)"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="activeTab() === 'signup' ? 'Create your account' : 'Sign in to your account'"
>
  <div class="bg-canvas w-full max-w-md rounded-[22px] p-8 shadow-2xl relative">
    <!-- Close -->
    <button
      type="button"
      (click)="close.emit()"
      class="absolute top-6 right-6 text-muted hover:text-ink transition-colors"
      aria-label="Close dialog"
    >
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
        <path d="M4 4l12 12M16 4L4 16" />
      </svg>
    </button>

    <!-- Wordmark -->
    <p class="font-display text-ink text-lg font-medium mb-7" aria-label="ilook.hot">
      ilook<span class="text-coral" aria-hidden="true">.</span>hot
    </p>

    <!-- Tabs -->
    <div class="flex gap-1 mb-7 bg-soft-stone rounded-full p-1" role="tablist" aria-label="Authentication options">
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="activeTab() === 'signup'"
        [class]="activeTab() === 'signup'
          ? 'flex-1 text-sm font-medium py-2 px-4 rounded-full bg-white text-ink shadow-sm transition-all'
          : 'flex-1 text-sm py-2 px-4 rounded-full text-muted hover:text-ink transition-all'"
        (click)="activeTab.set('signup'); errorMsg.set(null)"
      >
        Sign up
      </button>
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="activeTab() === 'signin'"
        [class]="activeTab() === 'signin'
          ? 'flex-1 text-sm font-medium py-2 px-4 rounded-full bg-white text-ink shadow-sm transition-all'
          : 'flex-1 text-sm py-2 px-4 rounded-full text-muted hover:text-ink transition-all'"
        (click)="activeTab.set('signin'); errorMsg.set(null)"
      >
        Sign in
      </button>
    </div>

    @if (activeTab() === 'signup') {
      <form [formGroup]="signupForm" (ngSubmit)="onSubmitSignup()" novalidate>
        <div class="flex flex-col gap-4">
          <div>
            <label for="signup-email" class="block text-sm font-medium text-ink mb-1.5 font-body">Email</label>
            <input
              id="signup-email"
              type="email"
              formControlName="email"
              placeholder="you&#64;example.com"
              autocomplete="email"
              class="w-full border border-hairline rounded-lg px-4 py-3 text-sm text-ink placeholder:text-muted focus:outline-none focus:border-coral transition-colors font-body"
            />
          </div>

          <div>
            <label for="signup-password" class="block text-sm font-medium text-ink mb-1.5 font-body">Password</label>
            <input
              id="signup-password"
              type="password"
              formControlName="password"
              placeholder="8+ characters"
              autocomplete="new-password"
              class="w-full border border-hairline rounded-lg px-4 py-3 text-sm text-ink placeholder:text-muted focus:outline-none focus:border-coral transition-colors font-body"
            />
          </div>

          <div class="bg-soft-stone rounded-lg p-4 text-xs text-body-muted font-body leading-relaxed">
            ilook.hot is self-hosted on personal infrastructure. There may be occasional downtime. This is not a commercial
            service with uptime guarantees.
          </div>

          <label class="flex items-start gap-3 cursor-pointer">
            <input
              type="checkbox"
              formControlName="acknowledgeDowntime"
              class="mt-0.5 accent-coral shrink-0"
            />
            <span class="text-sm text-body-muted font-body leading-snug">
              I understand that ilook.hot may experience occasional downtime.
            </span>
          </label>

          @if (errorMsg()) {
            <p class="text-xs text-red-500 font-body" role="alert">{{ errorMsg() }}</p>
          }

          <button
            type="submit"
            [disabled]="signupForm.invalid || submitting()"
            class="w-full bg-primary text-white text-sm font-medium py-3.5 rounded-full hover:bg-ink transition-colors disabled:opacity-40 disabled:cursor-not-allowed mt-1"
          >
            {{ submitting() ? 'Creating account…' : 'Create account' }}
          </button>
        </div>
      </form>
    } @else {
      <form [formGroup]="signinForm" (ngSubmit)="onSubmitSignin()" novalidate>
        <div class="flex flex-col gap-4">
          <div>
            <label for="signin-email" class="block text-sm font-medium text-ink mb-1.5 font-body">Email</label>
            <input
              id="signin-email"
              type="email"
              formControlName="email"
              placeholder="you&#64;example.com"
              autocomplete="email"
              class="w-full border border-hairline rounded-lg px-4 py-3 text-sm text-ink placeholder:text-muted focus:outline-none focus:border-coral transition-colors font-body"
            />
          </div>

          <div>
            <label for="signin-password" class="block text-sm font-medium text-ink mb-1.5 font-body">Password</label>
            <input
              id="signin-password"
              type="password"
              formControlName="password"
              placeholder="Your password"
              autocomplete="current-password"
              class="w-full border border-hairline rounded-lg px-4 py-3 text-sm text-ink placeholder:text-muted focus:outline-none focus:border-coral transition-colors font-body"
            />
          </div>

          @if (errorMsg()) {
            <p class="text-xs text-red-500 font-body" role="alert">{{ errorMsg() }}</p>
          }

          <button
            type="submit"
            [disabled]="signinForm.invalid || submitting()"
            class="w-full bg-primary text-white text-sm font-medium py-3.5 rounded-full hover:bg-ink transition-colors disabled:opacity-40 disabled:cursor-not-allowed mt-1"
          >
            {{ submitting() ? 'Signing in…' : 'Sign in' }}
          </button>

          <p class="text-center text-xs text-muted font-body">
            No account?
            <button type="button" (click)="activeTab.set('signup')" class="text-action-blue hover:underline">
              Sign up free
            </button>
          </p>
        </div>
      </form>
    }
  </div>
</div>
